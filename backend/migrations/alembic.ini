# Alembic Configuration File

[alembic]
# path to migration scripts
script_location = .

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to datetime.datetime.now(timezone.utc)
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field of the migration file
# (affects the length of the file name as well as the migration id)
# leave blank to use the computed legacy default of character count
# before the first naming convention character
# sqlalchemy.url_length = 40

# The output encoding used when revision files
# are written from script.py.mako.
# string value is passed to codecs.lookup() which accepts encoding names
# such as 'utf-8', 'ascii', 'latin1', or 'iso8859_1'
sqlalchemy.url = driver://user:password@localhost/dbname

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
