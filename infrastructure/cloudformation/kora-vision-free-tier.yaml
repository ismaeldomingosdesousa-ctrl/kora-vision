AWSTemplateFormatVersion: '2010-09-09'
Description: 'Kora Vision - AWS Free-Tier Infrastructure (Ultra-Simplified MVP)'

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 Key Pair to enable SSH access
    ConstraintDescription: Must be the name of an existing EC2 Key Pair

  DBMasterUsername:
    Type: String
    Default: admin
    Description: Master username for RDS PostgreSQL
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'

  DBMasterPassword:
    Type: String
    NoEcho: true
    Description: Master password for RDS PostgreSQL (min 8 characters)
    MinLength: 8
    MaxLength: 41

Resources:
  # ============================================================================
  # Security Groups (using default VPC)
  # ============================================================================

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Kora Vision EC2
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8003
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: kora-vision-ec2-sg

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Kora Vision RDS
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref EC2SecurityGroup
      Tags:
        - Key: Name
          Value: kora-vision-rds-sg

  # ============================================================================
  # EC2 Instance (t2.micro - Free-Tier)
  # ============================================================================

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: t2.micro
      KeyName: !Ref KeyPairName
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          echo "🚀 Iniciando setup do Kora Vision..."
          yum update -y
          amazon-linux-extras install python3.11 -y
          curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -
          yum install -y nodejs postgresql15 git docker
          systemctl start docker
          systemctl enable docker
          usermod -aG docker ec2-user
          cd /home/ec2-user
          git clone https://github.com/ismaeldomingosdesousa-ctrl/kora-vision.git
          echo "✅ Setup concluído!"
      Tags:
        - Key: Name
          Value: kora-vision-backend

  # ============================================================================
  # RDS PostgreSQL (t3.micro - Free-Tier)
  # ============================================================================

  RDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: kora-vision-db
      Engine: postgres
      EngineVersion: '15.4'
      DBInstanceClass: db.t3.micro
      AllocatedStorage: '20'
      StorageType: gp2
      DBName: koravision
      MasterUsername: !Ref DBMasterUsername
      MasterUserPassword: !Ref DBMasterPassword
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      PubliclyAccessible: true
      BackupRetentionPeriod: 7
      MultiAZ: false
      StorageEncrypted: false
      Tags:
        - Key: Name
          Value: kora-vision-postgres

  # ============================================================================
  # S3 Bucket for Frontend
  # ============================================================================

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'kora-vision-frontend-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: kora-vision-frontend

Outputs:
  EC2PublicIP:
    Description: Public IP of EC2 instance
    Value: !GetAtt EC2Instance.PublicIp

  EC2InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance

  RDSEndpoint:
    Description: RDS PostgreSQL endpoint
    Value: !GetAtt RDSInstance.Endpoint.Address

  RDSPort:
    Description: RDS PostgreSQL port
    Value: !GetAtt RDSInstance.Endpoint.Port

  S3BucketName:
    Description: S3 bucket name for frontend
    Value: !Ref FrontendBucket

  SSHCommand:
    Description: SSH command to connect to EC2
    Value: !Sub 'ssh -i /path/to/key.pem ec2-user@${EC2Instance.PublicIp}'

  PSQLCommand:
    Description: psql command to connect to RDS
    Value: !Sub 'psql -h ${RDSInstance.Endpoint.Address} -U ${DBMasterUsername} -d koravision'
