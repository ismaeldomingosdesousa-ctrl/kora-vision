AWSTemplateFormatVersion: '2010-09-09'
Description: 'Kora Vision MVP - AWS Free-Tier Infrastructure'

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 Key Pair to enable SSH access

  DBMasterUsername:
    Type: String
    Default: admin
    Description: Master username for RDS PostgreSQL
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'

  DBMasterPassword:
    Type: String
    NoEcho: true
    Description: Master password for RDS PostgreSQL (min 8 characters)
    MinLength: 8
    MaxLength: 41

Resources:
  # Get default VPC
  DefaultVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 172.31.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true

  # Security Groups WITH VpcId
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: kora-vision-ec2-sg
      GroupDescription: Security group for Kora Vision EC2
      VpcId: !Ref DefaultVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8003
          CidrIp: 0.0.0.0/0

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: kora-vision-rds-sg
      GroupDescription: Security group for Kora Vision RDS
      VpcId: !Ref DefaultVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref EC2SecurityGroup

  # EC2 Instance
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: t2.micro
      KeyName: !Ref KeyPairName
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y python3 nodejs git docker postgresql15
          systemctl start docker
          systemctl enable docker
          usermod -aG docker ec2-user
      Tags:
        - Key: Name
          Value: kora-vision-backend

  # RDS Instance
  RDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: kora-vision-db
      Engine: postgres
      EngineVersion: '15.4'
      DBInstanceClass: db.t3.micro
      AllocatedStorage: '20'
      StorageType: gp2
      DBName: koravision
      MasterUsername: !Ref DBMasterUsername
      MasterUserPassword: !Ref DBMasterPassword
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      PubliclyAccessible: true
      BackupRetentionPeriod: 7
      MultiAZ: false
      StorageEncrypted: false
      Tags:
        - Key: Name
          Value: kora-vision-postgres

  # S3 Bucket
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'kora-vision-frontend-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: kora-vision-frontend

Outputs:
  EC2PublicIP:
    Description: Public IP of EC2 instance
    Value: !GetAtt EC2Instance.PublicIp

  RDSEndpoint:
    Description: RDS PostgreSQL endpoint
    Value: !GetAtt RDSInstance.Endpoint.Address

  S3BucketName:
    Description: S3 bucket name for frontend
    Value: !Ref FrontendBucket

  SSHCommand:
    Description: SSH command to connect to EC2
    Value: !Sub 'ssh -i /path/to/key.pem ec2-user@${EC2Instance.PublicIp}'

  PSQLCommand:
    Description: psql command to connect to RDS
    Value: !Sub 'psql -h ${RDSInstance.Endpoint.Address} -U ${DBMasterUsername} -d koravision'
